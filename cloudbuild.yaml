# Google Cloud Build configuration for deploying to Cloud Run
steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/the-forum:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/the-forum:latest'
      - '.'

  # Push the image (needed before deploy)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/the-forum']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'the-forum'
      - '--image'
      - 'gcr.io/$PROJECT_ID/the-forum:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,ENVIRONMENT=production,GCP_LOCATION=$_GCP_LOCATION,GCS_BUCKET_NAME=$_GCS_BUCKET_NAME'
      - '--set-secrets'
      - 'SLACK_SIGNING_SECRET=slack-signing-secret:latest'

options:
  logging: CLOUD_LOGGING_ONLY
